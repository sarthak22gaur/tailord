# agentsync configuration. Sourced by the sync scripts.

# Where the Claude system prompt is written, relative to workspace root.
# Default: .claude/CLAUDE.md   |   Common alternative: CLAUDE.md (repo root)
CLAUDE_MD_TARGET=".claude/CLAUDE.md"

# Which generated output git tracks. agentsync keeps a marked block in the
# workspace .gitignore in sync with this.
#   all        commit everything generated (0.1.0 behavior)
#   root-docs  commit entrypoint docs; gitignore the regenerable dirs
#   none       gitignore all generated output; track only agents/
#
# tailord COMMITS its generated surface dirs (.claude/, .codex/, .opencode/) and
# CI runs `tailord sync-skills --check` against them. agentsync must not
# gitignore those dirs, so we use `all` to match the repo's convention.
OUTPUT_TRACKING="all"
