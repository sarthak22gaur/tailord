<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>tailord — Settings</title>
  <style>
    body {
      font: 14px -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 520px;
      margin: 40px auto;
      padding: 0 16px;
      color: #111;
    }
    h2 { margin-top: 0; }
    p { line-height: 1.45; }
    label { display: block; margin-top: 16px; font-weight: 500; }
    input {
      width: 100%;
      padding: 8px 10px;
      margin-top: 6px;
      font: 13px ui-monospace, SF Mono, monospace;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .row { margin-top: 20px; display: flex; gap: 8px; }
    button {
      padding: 8px 16px;
      background: #2563eb;
      color: white;
      border: 0;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button.secondary { background: white; color: #2563eb; border: 1px solid #2563eb; }
    button:hover { filter: brightness(1.05); }
    #status { margin-top: 16px; padding: 8px; border-radius: 4px; font-size: 13px; min-height: 20px; }
    .ok { background: #dcfce7; color: #166534; }
    .err { background: #fee2e2; color: #991b1b; }
    .hint { color: #666; font-size: 12px; font-weight: 400; margin-top: 4px; }
    .callout {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      padding: 10px 12px;
      color: #1e3a8a;
      font-size: 13px;
    }
    code { font-family: ui-monospace, SF Mono, monospace; }
  </style>
</head>
<body>
  <h2>tailord — Settings</h2>

  <p class="callout">
    This extension is a local companion for tailord. Start the bridge on your
    machine with <code>tailord serve</code>, then paste the bridge token here.
    Job descriptions are sent only to your local bridge URL.
  </p>

  <label>Bridge URL
    <input id="bridgeUrl" placeholder="http://127.0.0.1:8787">
    <div class="hint">Must be http://127.0.0.1 or http://localhost. Should match BRIDGE_PORT.</div>
  </label>

  <label>Bridge token
    <input id="bridgeToken" type="password" placeholder="paste from .env">
    <div class="hint">Copy the BRIDGE_TOKEN value printed by setup-bridge or stored in tools/jd-bridge/.env.</div>
  </label>

  <div class="row">
    <button id="save">Save</button>
    <button id="test" class="secondary">Test connection</button>
  </div>

  <div id="status"></div>

  <script src="../shared/browser-api.js"></script>
  <script src="options.js"></script>
</body>
</html>
